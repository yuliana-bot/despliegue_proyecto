{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acerautos — Contraseña Actualizada</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --rojo: #c0392b; --rojo2: #e74c3c; --negro: #0a0a0a; --blanco: #f5f5f5; }
  body { min-height: 100vh; font-family: 'Exo 2', sans-serif; overflow: hidden; background: var(--negro); }
  .bg { position: fixed; inset: 0; z-index: 0; background-image: url("{% static 'imagenes/imagen_fondo_login.jpeg' %}"); background-size: cover; background-position: center 40%; filter: brightness(0.52) saturate(0.7) contrast(1.1); transform: scale(1.04); transition: transform 8s ease; }
  body:hover .bg { transform: scale(1.0); }
  .overlay { position: fixed; inset: 0; z-index: 1; background: linear-gradient(135deg, rgba(10,10,10,0.93) 0%, rgba(10,10,10,0.55) 50%, rgba(192,57,43,0.18) 100%), linear-gradient(to right, rgba(10,10,10,0.98) 0%, rgba(10,10,10,0.3) 55%, transparent 100%); }
  .diagonal { position: fixed; inset: 0; z-index: 2; pointer-events: none; overflow: hidden; }
  .diagonal::after { content: ''; position: absolute; top: -10%; left: 55%; width: 3px; height: 130%; background: linear-gradient(to bottom, transparent, var(--rojo), transparent); transform: rotate(-8deg); opacity: 0.4; }
  .watermark { position: fixed; bottom: 28px; right: 28px; z-index: 3; opacity: 0.05; font-family: 'Bebas Neue', sans-serif; font-size: 7rem; color: white; letter-spacing: 8px; pointer-events: none; }
  .particles { position: fixed; inset: 0; z-index: 3; pointer-events: none; }
  .particle { position: absolute; background: var(--rojo2); border-radius: 50%; animation: rise linear infinite; opacity: 0; }
  @keyframes rise { 0% { transform: translateY(100vh) scale(0); opacity: 0; } 10% { opacity: 0.6; } 90% { opacity: 0.3; } 100% { transform: translateY(-20px) scale(1.5); opacity: 0; } }
 
  .layout { position: relative; z-index: 10; display: grid; grid-template-columns: 1fr 460px; min-height: 100vh; }
  .left { display: flex; flex-direction: column; justify-content: center; padding: 60px 70px; animation: fadeInLeft 0.9s cubic-bezier(.16,1,.3,1) both; }
  .brand-logo { width: 120px; height: 120px; object-fit: cover; border-radius: 16px; margin-bottom: 44px; filter: drop-shadow(0 0 20px rgba(192,57,43,0.5)); animation: float 4s ease-in-out infinite; box-shadow: 0 0 0 3px rgba(211,47,47,.4), 0 0 20px rgba(211,47,47,.2); }
  @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
  .brand-name { font-family: 'Bebas Neue', sans-serif; font-size: clamp(3.5rem, 7vw, 6rem); line-height: 0.9; color: var(--blanco); letter-spacing: 4px; margin-bottom: 8px; }
  .brand-name em { font-style: normal; color: var(--rojo2); }
  .brand-sub { font-family: 'Rajdhani', sans-serif; font-size: 1.05rem; font-weight: 600; letter-spacing: 6px; text-transform: uppercase; color: var(--rojo2); }
 
  .right { display: flex; align-items: center; justify-content: center; padding: 40px 48px; background: rgba(10,10,10,0.88); border-left: 1px solid rgba(192,57,43,0.18); backdrop-filter: blur(22px); animation: fadeInRight 0.9s cubic-bezier(.16,1,.3,1) 0.2s both; }
  .form-card { width: 100%; max-width: 350px; }
 
  .icon-success {
    width: 70px; height: 70px; border-radius: 50%;
    background: rgba(22,163,74,0.12); border: 1.5px solid rgba(22,163,74,0.3);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 28px;
    animation: popIn .4s cubic-bezier(.34,1.56,.64,1) both;
  }
  @keyframes popIn { from { opacity:0; transform:scale(.5); } to { opacity:1; transform:scale(1); } }
  .icon-success i { font-size: 1.8rem; color: #4ade80; }
 
  .form-eyebrow { font-family: 'Rajdhani', sans-serif; font-size: 0.72rem; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; color: var(--rojo2); margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
  .form-eyebrow::before { content: ''; display: block; width: 22px; height: 2px; background: var(--rojo2); }
  .form-title { font-family: 'Bebas Neue', sans-serif; font-size: 2.8rem; letter-spacing: 3px; color: var(--blanco); margin-bottom: 4px; line-height: 1; }
  .form-desc { font-size: 0.83rem; color: rgba(245,245,245,0.32); margin-bottom: 36px; font-weight: 300; line-height: 1.7; }
 
  .btn-submit { width: 100%; background: linear-gradient(135deg, var(--rojo) 0%, var(--rojo2) 100%); border: none; border-radius: 6px; padding: 15px; color: var(--blanco); font-family: 'Rajdhani', sans-serif; font-size: 1rem; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; cursor: pointer; position: relative; overflow: hidden; transition: all 0.3s; box-shadow: 0 4px 24px rgba(192,57,43,0.35); display: flex; align-items: center; justify-content: center; gap: 10px; text-decoration: none; }
  .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(192,57,43,0.5); color: white; }
  .btn-submit::after { content: ''; position: absolute; top: 0; left: -100%; width: 60%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent); transition: left 0.5s; }
  .btn-submit:hover::after { left: 150%; }
 
  .form-footer { margin-top: 30px; padding-top: 22px; border-top: 1px solid rgba(255,255,255,0.06); text-align: center; font-size: 0.72rem; color: rgba(245,245,245,0.2); font-family: 'Rajdhani', sans-serif; letter-spacing: 1px; }
 
  @keyframes fadeInLeft  { from { opacity:0; transform:translateX(-40px); } to { opacity:1; transform:translateX(0); } }
  @keyframes fadeInRight { from { opacity:0; transform:translateX(40px);  } to { opacity:1; transform:translateX(0); } }
  @media (max-width: 768px) { .layout { grid-template-columns: 1fr; } .left { display: none; } .right { padding: 40px 28px; } }
</style>
</head>
<body>
<div class="bg"></div>
<div class="overlay"></div>
<div class="diagonal"></div>
<div class="watermark">ACERAUTOS</div>
<div class="particles" id="particles"></div>
 
<div class="layout">
  <div class="left">
    <img class="brand-logo" src="{% static 'imagenes/logoempresa.jpeg' %}" alt="Acerautos logo">
    <div class="brand-name">Acer<em>autos</em></div>
    <div class="brand-sub">Centro Integral Automotriz</div>
  </div>
  <div class="right">
    <div class="form-card">
      <div class="icon-success"><i class="fas fa-check"></i></div>
      <div class="form-eyebrow">Listo</div>
      <h1 class="form-title">Contraseña actualizada</h1>
      <p class="form-desc">Tu contraseña ha sido restablecida correctamente. Ya puedes iniciar sesión con tu nueva contraseña.</p>
 
      <a href="{% url 'login:login' %}" class="btn-submit">
        <i class="fas fa-arrow-right-to-bracket"></i>
        Iniciar sesión
      </a>
 
      <div class="form-footer">Sistema de Gestión &copy; Acerautos 2026</div>
    </div>
  </div>
</div>
 
<script>
  const container = document.getElementById('particles');
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div'); p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDuration = (6 + Math.random() * 10) + 's';
    p.style.animationDelay = (Math.random() * 8) + 's';
    const size = (1 + Math.random() * 3) + 'px'; p.style.width = p.style.height = size;
    container.appendChild(p);
  }
</script>
</body>
</html>
