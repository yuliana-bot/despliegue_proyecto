name: Integración Continua

on:
  push:
    branches: ["main", "master"]

jobs:
  testeo:
    runs-on: ubuntu-latest

    steps:
      - name: Obtener el codigo
        uses: actions/checkout@v4

      - name: configurar python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: instalar dependencias del sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config \
            libcairo2-dev libpango-1.0-0 libpangocairo-1.0-0 \
            libpangoft2-1.0-0 libgdk-pixbuf-2.0-0 libffi-dev shared-mime-info fonts-liberation

      - name: instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-django

      - name: ejecutar pruebas
        env:
          SECRET_KEY: clave-temporal-para-ci
          DEBUG: "False"
        run: |
          pytest app/tests.py --ds=sena.settings