<script>
(function () {
  var btn        = document.getElementById('acc-btn');
  var panel      = document.getElementById('acc-panel');
  var closeBtn   = document.getElementById('acc-close');
  var resetBtn   = document.getElementById('acc-reset');
  var leerBtn    = document.getElementById('acc-leer-pagina');
  var overlay    = document.getElementById('acc-overlay');
  var toast      = document.getElementById('acc-narrator-toast');
  var toastText  = document.getElementById('acc-narrator-text');
  var STORE      = 'acerautos_acc_v3';

  var clases      = ['acc-modo-claro','acc-alto-contraste','acc-cursor-grande','acc-espaciado','acc-subrayar-links','acc-narrador'];
  var fuenteClases = ['acc-fuente-md','acc-fuente-lg','acc-fuente-xl'];
  var fontClases   = ['acc-font-sans','acc-font-serif','acc-font-mono','acc-font-dyslexia'];
  var temaClases   = ['acc-tema-azul','acc-tema-verde','acc-tema-purpura','acc-tema-naranja','acc-tema-carbon'];

  var MODULOS = {
    'dashboard':'Panel de Control','clientes':'Módulo de Clientes','vehiculos':'Módulo de Vehículos',
    'usuarios':'Módulo de Usuarios','marca':'Módulo de Marcas','proveedor':'Módulo de Proveedores',
    'producto':'Módulo de Productos','compatibilidad':'Módulo de Compatibilidad','tipo_servicio':'Módulo de Servicios',
    'orden_servicio':'Módulo de Órdenes','detalles':'Análisis de Consumo','seguimiento':'Módulo de Seguimiento',
    'compras':'Módulo de Compras','caja':'Módulo de Caja','factura':'Módulo de Facturación',
    'notificaciones':'Módulo de Notificaciones','backup':'Respaldo de Datos'
  };

  function getNombreModulo() {
    var path = window.location.pathname;
    var partes = path.split('/').filter(Boolean);
    for (var i = 0; i < partes.length; i++) {
      if (MODULOS[partes[i]]) return MODULOS[partes[i]];
    }
    return 'Sistema ACERAUTOS';
  }

  function hablar(texto) {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    var u = new SpeechSynthesisUtterance(texto);
    u.lang = 'es-CO';
    u.rate = 0.95;
    u.pitch = 1;
    window.speechSynthesis.speak(u);
  }

  function mostrarToast(texto) {
    toastText.textContent = texto;
    toast.classList.add('visible');
    clearTimeout(toast._t);
    toast._t = setTimeout(function(){ toast.classList.remove('visible'); }, 3500);
  }

  function activarNarrador() {
    var nombre = getNombreModulo();
    hablar('Has ingresado a ' + nombre);
    mostrarToast('🔊 ' + nombre);
  }

  function guardar() {
    var activos = clases.filter(function(c){ return document.body.classList.contains(c); });
    var fuente  = fuenteClases.find(function(c){ return document.body.classList.contains(c); }) || 'normal';
    var font    = fontClases.find(function(c){ return document.body.classList.contains(c); }) || 'normal';
    var tema    = temaClases.find(function(c){ return document.body.classList.contains(c); }) || 'default';
    try { localStorage.setItem(STORE, JSON.stringify({ activos:activos, fuente:fuente, font:font, tema:tema })); } catch(e){}
  }

  function cargar() {
    try {
      var data = JSON.parse(localStorage.getItem(STORE) || '{}');
      (data.activos || []).forEach(function(c){ document.body.classList.add(c); });
      if (data.fuente && data.fuente !== 'normal') document.body.classList.add(data.fuente);
      if (data.font   && data.font   !== 'normal') document.body.classList.add(data.font);
      if (data.tema   && data.tema   !== 'default') document.body.classList.add(data.tema);
      if (data.activos && data.activos.indexOf('acc-narrador') !== -1) activarNarrador();
      sincronizar();
    } catch(e){}
  }

  function sincronizar() {
    document.querySelectorAll('.acc-opcion').forEach(function(b){
      var c = b.getAttribute('data-acc');
      if (!c) return;
      var on = document.body.classList.contains(c);
      b.classList.toggle('activo', on);
      b.setAttribute('aria-pressed', on ? 'true' : 'false');
    });
    var fActiva = fuenteClases.find(function(c){ return document.body.classList.contains(c); }) || 'normal';
    document.querySelectorAll('.acc-size-btn').forEach(function(b){
      b.classList.toggle('activo', b.getAttribute('data-size') === fActiva);
    });
    var fontActiva = fontClases.find(function(c){ return document.body.classList.contains(c); }) || 'normal';
    document.querySelectorAll('.acc-font-opcion').forEach(function(b){
      b.classList.toggle('activo', b.getAttribute('data-font') === fontActiva);
    });
    var temaActivo = temaClases.find(function(c){ return document.body.classList.contains(c); }) || 'default';
    document.querySelectorAll('.acc-color-chip').forEach(function(b){
      b.classList.toggle('activo', b.getAttribute('data-tema') === temaActivo);
    });
  }

  function abrir() { panel.classList.add('abierto'); overlay.classList.add('visible'); btn.setAttribute('aria-expanded','true'); closeBtn.focus(); }
  function cerrar() { panel.classList.remove('abierto'); overlay.classList.remove('visible'); btn.setAttribute('aria-expanded','false'); btn.focus(); }

  btn.addEventListener('click', function(){ panel.classList.contains('abierto') ? cerrar() : abrir(); });
  closeBtn.addEventListener('click', cerrar);
  overlay.addEventListener('click', cerrar);
  document.addEventListener('keydown', function(e){ if (e.key==='Escape' && panel.classList.contains('abierto')) cerrar(); });

  document.querySelectorAll('.acc-opcion').forEach(function(b){
    b.addEventListener('click', function(){
      var c = b.getAttribute('data-acc');
      if (!c) return;
      if (c === 'acc-narrador') {
        document.body.classList.toggle(c);
        if (document.body.classList.contains(c)) activarNarrador();
        else { window.speechSynthesis && window.speechSynthesis.cancel(); mostrarToast('Narrador desactivado'); }
        sincronizar(); guardar(); return;
      }
      if (c === 'acc-modo-claro'     && !document.body.classList.contains(c)) document.body.classList.remove('acc-alto-contraste');
      if (c === 'acc-alto-contraste' && !document.body.classList.contains(c)) document.body.classList.remove('acc-modo-claro');
      document.body.classList.toggle(c);
      sincronizar(); guardar();
    });
  });

  leerBtn.addEventListener('click', function(){
    var texto = document.querySelector('main') ? document.querySelector('main').innerText : document.body.innerText;
    hablar(texto.substring(0, 600));
    mostrarToast('Leyendo página...');
  });

  document.querySelectorAll('.acc-font-opcion').forEach(function(b){
    b.addEventListener('click', function(){
      fontClases.forEach(function(c){ document.body.classList.remove(c); });
      var f = b.getAttribute('data-font');
      if (f !== 'normal') document.body.classList.add(f);
      sincronizar(); guardar();
    });
  });

  document.querySelectorAll('.acc-size-btn').forEach(function(b){
    b.addEventListener('click', function(){
      fuenteClases.forEach(function(c){ document.body.classList.remove(c); });
      var s = b.getAttribute('data-size');
      if (s !== 'normal') document.body.classList.add(s);
      sincronizar(); guardar();
    });
  });

  document.querySelectorAll('.acc-color-chip').forEach(function(b){
    b.addEventListener('click', function(){
      temaClases.forEach(function(c){ document.body.classList.remove(c); });
      var t = b.getAttribute('data-tema');
      if (t !== 'default') document.body.classList.add(t);
      sincronizar(); guardar();
    });
  });

  resetBtn.addEventListener('click', function(){
    clases.forEach(function(c){ document.body.classList.remove(c); });
    fuenteClases.forEach(function(c){ document.body.classList.remove(c); });
    fontClases.forEach(function(c){ document.body.classList.remove(c); });
    temaClases.forEach(function(c){ document.body.classList.remove(c); });
    window.speechSynthesis && window.speechSynthesis.cancel();
    sincronizar();
    try { localStorage.removeItem(STORE); } catch(e){}
  });

  cargar();
})();

(function () {
  var STORE_DRAG = 'acerautos_btn_positions';

  function cargarPosiciones() {
    try { return JSON.parse(localStorage.getItem(STORE_DRAG) || '{}'); } catch(e) { return {}; }
  }

  function guardarPosicion(id, bottom, right) {
    var pos = cargarPosiciones();
    pos[id] = { bottom: bottom, right: right };
    try { localStorage.setItem(STORE_DRAG, JSON.stringify(pos)); } catch(e) {}
  }

  function aplicarPosicionGuardada(el, id) {
    var pos = cargarPosiciones();
    if (pos[id]) {
      el.style.bottom = pos[id].bottom + 'px';
      el.style.right  = pos[id].right  + 'px';
    }
  }

  function reposicionarPanel(btn, panel) {
    if (!panel) return;
    var btnBottom = parseInt(btn.style.bottom || getComputedStyle(btn).bottom) || 0;
    var btnRight  = parseInt(btn.style.right  || getComputedStyle(btn).right)  || 0;
    var btnH      = btn.offsetHeight || 52;
    var panelH    = panel.offsetHeight || 500;
    var panelW    = panel.offsetWidth  || 340;

    var panelBottom = btnBottom + btnH + 8;
    var panelRight  = btnRight;

    if (panelBottom + panelH > window.innerHeight - 8) {
      panelBottom = window.innerHeight - panelH - 8;
    }
    if (panelRight + panelW > window.innerWidth - 8) {
      panelRight = window.innerWidth - panelW - 8;
    }
    if (panelRight < 8) panelRight = 8;

    panel.style.bottom = panelBottom + 'px';
    panel.style.right  = panelRight  + 'px';
    panel.style.top    = 'auto';
    panel.style.left   = 'auto';
  }

  function hacerArrastrable(el, id, panelId) {
    if (!el) return;
    aplicarPosicionGuardada(el, id);

    var panel = panelId ? document.getElementById(panelId) : null;
    if (panel) reposicionarPanel(el, panel);

    var arrastrandoFlag = false;
    var startX, startY, startRight, startBottom;
    var UMBRAL = 5;

    function onDown(e) {
      var pt = e.touches ? e.touches[0] : e;
      startX      = pt.clientX;
      startY      = pt.clientY;
      startRight  = parseInt(el.style.right  || getComputedStyle(el).right)  || 0;
      startBottom = parseInt(el.style.bottom || getComputedStyle(el).bottom) || 0;
      arrastrandoFlag = false;

      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup',   onUp);
      document.addEventListener('touchmove', onMove, { passive: false });
      document.addEventListener('touchend',  onUp);
    }

    function onMove(e) {
      var pt = e.touches ? e.touches[0] : e;
      var dx = pt.clientX - startX;
      var dy = pt.clientY - startY;

      if (!arrastrandoFlag && Math.abs(dx) < UMBRAL && Math.abs(dy) < UMBRAL) return;
      arrastrandoFlag = true;
      if (e.cancelable) e.preventDefault();

      var nuevoRight  = startRight  - dx;
      var nuevoBottom = startBottom - dy;

      var maxRight  = window.innerWidth  - el.offsetWidth  - 4;
      var maxBottom = window.innerHeight - el.offsetHeight - 4;
      nuevoRight  = Math.max(4, Math.min(maxRight,  nuevoRight));
      nuevoBottom = Math.max(4, Math.min(maxBottom, nuevoBottom));

      el.style.right  = nuevoRight  + 'px';
      el.style.bottom = nuevoBottom + 'px';

      if (panel && (panel.classList.contains('abierto') || panel.style.display === 'flex')) {
        reposicionarPanel(el, panel);
      }
    }

    function onUp() {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup',   onUp);
      document.removeEventListener('touchmove', onMove);
      document.removeEventListener('touchend',  onUp);

      if (arrastrandoFlag) {
        guardarPosicion(id,
          parseInt(el.style.bottom),
          parseInt(el.style.right)
        );
        reposicionarPanel(el, panel);

        el.addEventListener('click', function bloquearClick(ev) {
          ev.stopImmediatePropagation();
          ev.preventDefault();
          el.removeEventListener('click', bloquearClick, true);
        }, true);
      }
    }

    el.style.cursor = 'grab';
    el.addEventListener('mousedown',  onDown);
    el.addEventListener('touchstart', onDown, { passive: true });

    if (panel) {
      var observer = new MutationObserver(function() {
        if (panel.classList.contains('abierto') || panel.style.display === 'flex') {
          reposicionarPanel(el, panel);
        }
      });
      observer.observe(panel, { attributes: true, attributeFilter: ['class', 'style'] });
    }
  }

  function init() {
    hacerArrastrable(document.getElementById('acc-btn'),     'acc-btn',     'acc-panel');
    hacerArrastrable(document.getElementById('chatbot-btn'), 'chatbot-btn', 'chatbot-box');
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
