{% extends 'body.html' %}

{% block contenido %}

<div class="container-fluid px-4 py-5">

    <div class="row justify-content-center">

        <div class="col-lg-6">

            <div class="card border-0 shadow-lg rounded-4 overflow-hidden">

                <!-- HEADER -->
                <div class="bg-danger text-white p-4 text-center">

                    <i class="fas fa-trash-alt fa-4x mb-3"></i>

                    <h2 class="fw-bold mb-0">
                        Eliminar Seguimiento
                    </h2>

                </div>

                <!-- BODY -->
                <div class="card-body p-5 text-center">

                    <h4 class="fw-semibold mb-4">
                        ¿Deseas eliminar este seguimiento?
                    </h4>

                    <div class="bg-light rounded-4 p-4 mb-4 text-start">

                        <p class="mb-3">
                            <strong>Vehículo:</strong>
                            {{ object.vehiculo }}
                        </p>

                        <p class="mb-3">
                            <strong>Estado:</strong>
                            {{ object.estado }}
                        </p>

                        <p class="mb-0">
                            <strong>Fecha próximo mantenimiento:</strong>
                            {{ object.fecha_proximo_mantenimiento }}
                        </p>

                    </div>

                    <form method="post">

                        {% csrf_token %}

                        <div class="d-flex justify-content-center gap-3">

                            <button type="submit"
                                    class="btn btn-danger px-5 py-2 rounded-pill fw-semibold">

                                <i class="fas fa-trash me-2"></i>

                                Eliminar

                            </button>

                            <a href="{% url 'app:seguimiento_list' %}"
                               class="btn btn-outline-secondary px-5 py-2 rounded-pill fw-semibold">

                                Cancelar

                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
