<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ titulo }}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Arial', sans-serif; font-size: 11px; color: #333; background-color: #fff; }
        @page {
            size: A4;
            margin: 1cm;
            @bottom-center {
                content: "Página " counter(page) " de " counter(pages);
                font-size: 10px;
            }
        }
        .header { text-align: center; margin-bottom: 20px; border-bottom: 2px solid #333; padding-bottom: 10px; }
        .header h1 { font-size: 18px; font-weight: bold; color: #1f4788; margin-bottom: 5px; }
        .header p { font-size: 10px; color: #666; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        thead { background-color: #4472C4; color: white; }
        thead th { padding: 8px; text-align: left; font-weight: bold; border: 1px solid #333; font-size: 10px; }
        tbody td { padding: 6px 8px; border: 1px solid #ddd; font-size: 10px; }
        tbody tr:nth-child(odd) { background-color: #f9f9f9; }
        tbody tr:nth-child(even) { background-color: #ffffff; }
        tbody tr:last-child { background-color: #e8e8e8; font-weight: bold; }
        .footer { margin-top: 20px; text-align: center; border-top: 2px solid #333; padding-top: 10px; font-size: 9px; color: #666; }
        .info { font-size: 9px; color: #999; text-align: right; margin-top: 10px; }
    </style>
</head>
